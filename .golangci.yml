version: "2"

run:
  tests: true

formatters:
  enable:
    - gofumpt
    - goimports
    - gci
  settings:
    gofumpt:
      module-path: tack
      extra-rules: true
    goimports:
      local-prefixes:
        - tack
    gci:
      custom-order: true
      no-inline-comments: true
      no-prefix-comments: true
      no-lex-order: true
      sections:
        - standard
        - default
        - prefix(tack)
        - blank
        - dot
        - alias
        - localmodule

linters:
  default: standard
  disable:
    - varnamelen
  enable:
    - depguard
    - noinlineerr
    - revive
    - wsl_v5

  settings:
    revive:
      severity: error

    depguard:
      rules:
        Main:
          files:
            - $all
          allow:
            - $gostd
            - charm.land/bubbletea/v2
            - charm.land/lipgloss/v2
            - modernc.org/sqlite
            - tack

    errcheck:
      check-type-assertions: true
      check-blank: true
      disable-default-exclusions: true
      verbose: true

issues:
  # No truncation: show everything in CI.
  max-issues-per-linter: 0
  max-same-issues: 0
